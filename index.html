<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Um convite</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

    font-family:"Segoe UI",sans-serif;

    background:linear-gradient(135deg,#dce9f5,#bfd5ea,#dce9f5);
    background-size:300% 300%;
    animation:fundo 12s ease infinite;

    color:#243447;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    overflow-x:hidden;
}


     .container{

    width:90%;
    max-width:700px;

    background:rgba(255,255,255,.96);

    padding:60px;

    border-radius:30px;

    box-shadow:0 20px 50px rgba(0,0,0,.12);

    text-align:center;

    transition:.5s;

    backdrop-filter:blur(12px);

}



        h1{

            font-size:2.5rem;
            margin-bottom:20px;

        }

        p{

            font-size:1.1rem;
            line-height:1.8;

        }

        button{

            margin-top:40px;

            padding:15px 35px;

            border:none;

            border-radius:50px;

            background:#6d94bf;

            color:white;

            font-size:1rem;

            cursor:pointer;

            transition:.3s;

        }

        button:hover{

            transform:translateY(-3px);

            background:#4d79a8;

        }
        .fade-out{

    opacity:0;

    transform:translateY(10px);

}

.fade-in{

    opacity:1;

    transform:translateY(0);

}

#titulo,
#texto{

    transition:
        opacity .45s ease,
        transform .45s ease;

}
@keyframes fundo{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }

}
    #texto{

    min-height:90px;

}
    .progresso{

    width:100%;

    height:8px;

    background:#d7e4f2;

    border-radius:20px;

    overflow:hidden;

    margin-bottom:35px;

}

.barra{

    width:0%;

    height:100%;

    background:linear-gradient(90deg,#7fa7d8,#5f89bd);

    border-radius:20px;

    transition:.5s;

}
.calendario{

    display:none;

    animation:aparecer .6s ease;

}

.calendario h2{

    margin-bottom:30px;

    font-size:2rem;

}

.grade{

    display:grid;

    grid-template-columns:repeat(7,1fr);

    gap:12px;

    margin-top:20px;

}

.dia{

    padding:15px 0;
    border-radius:12px;
    background:#edf4fb;
    transition:.3s;
    cursor:pointer;

}

.dia:hover{

    transform:scale(1.08);
    background:#6d94bf;
    color:white;

}


.semana{

    font-weight:bold;

    color:#6d94bf;

}

.vazio{

    background:transparent;

}
#mensagemData{

    margin-top:30px;

    font-size:1.2rem;

    color:#4d79a8;

    font-weight:600;

    min-height:30px;

}
@keyframes aparecer{

    from{

        opacity:0;
        transform:translateY(15px);

    }

    to{

        opacity:1;
        transform:translateY(0);

    }

}
    </style>

</head>

<body>

<div class="container" id="card">
<div class="progresso">

    <div class="barra" id="barra"></div>

</div>
    <h1 id="titulo">Tenho um convite para você.</h1>

    <p id="texto">
        Espero que você aceite.
    </p>

    <button id="botao">
        Começar
    </button>

</div>

<script>
const card = document.getElementById("card");
const titulo = document.getElementById("titulo");
const texto = document.getElementById("texto");
const botao = document.getElementById("botao");
const barra = document.getElementById("barra");
const mensagens = [

    {
        titulo:"Tenho um convite para você.",
        texto:"Espero que você aceite.",
        botao:"Começar"
    },

    {
        titulo:"Antes de tudo...",
        texto:"Essa é uma forma de tentar te impressionar, eu não sei programar.",
        botao:"Continuar"
    },

    {
        titulo:"Mas...",
        texto:"Achei que um convite comum não seria suficiente.",
        botao:"Continuar"
    },

    {
        titulo:"Então...",
        texto:"Resolvi fazer algo diferente para você.",
        botao:"Continuar"
    }

];
titulo.classList.add("fade-in");
texto.classList.add("fade-in");

let etapa = 0;
let digitando = false;
let diaEscolhido = "";

// Efeito de máquina de escrever
function escrever(textoCompleto){

    texto.textContent = "";
    digitando = true;

    let i = 0;

    const intervalo = setInterval(()=>{

        texto.textContent += textoCompleto.charAt(i);

        i++;

        if(i >= textoCompleto.length){

            clearInterval(intervalo);
            digitando = false;

        }

    },30);

}
function atualizarBarra(){

    const porcentagem = (etapa / (mensagens.length - 1)) * 100;

    barra.style.width = porcentagem + "%";

}
function mostrarMensagem(){

    titulo.classList.add("fade-out");
    texto.classList.add("fade-out");

    setTimeout(()=>{

        titulo.textContent = mensagens[etapa].titulo;

        escrever(mensagens[etapa].texto);

        botao.textContent = mensagens[etapa].botao;
        atualizarBarra();

        titulo.classList.remove("fade-out");
        texto.classList.remove("fade-out");

        titulo.classList.add("fade-in");
        texto.classList.add("fade-in");

    },450);

}
function mostrarCalendario(){

    card.innerHTML = `
    
    <div class="calendario" id="calendario">

        <h2>Agosto de 2026</h2>

    <div class="grade">

    <div class="semana">D</div>
    <div class="semana">S</div>
    <div class="semana">T</div>
    <div class="semana">Q</div>
    <div class="semana">Q</div>
    <div class="semana">S</div>
    <div class="semana">S</div>

    <div class="vazio"></div>
    <div class="vazio"></div>
    <div class="vazio"></div>
    <div class="vazio"></div>
    <div class="vazio"></div>
    <div class="vazio"></div>

<div class="dia" data-dia="1">1</div>
<div class="dia" data-dia="2">2</div>
<div class="dia" data-dia="3">3</div>
<div class="dia" data-dia="4">4</div>
<div class="dia" data-dia="5">5</div>
<div class="dia" data-dia="6">6</div>
<div class="dia" data-dia="7">7</div>
<div class="dia" data-dia="8">8</div>
<div class="dia" data-dia="9">9</div>
<div class="dia" data-dia="10">10</div>
<div class="dia" data-dia="11">11</div>
<div class="dia" data-dia="12">12</div>
<div class="dia" data-dia="13">13</div>
<div class="dia" data-dia="14">14</div>
<div class="dia" data-dia="15">15</div>
<div class="dia" data-dia="16">16</div>
<div class="dia" data-dia="17">17</div>
<div class="dia" data-dia="18">18</div>
<div class="dia" data-dia="19">19</div>
<div class="dia" data-dia="20">20</div>
<div class="dia" data-dia="21">21</div>
<div class="dia" data-dia="22">22</div>
<div class="dia" data-dia="23">23</div>
<div class="dia" data-dia="24">24</div>
<div class="dia" data-dia="25">25</div>
<div class="dia" data-dia="26">26</div>
<div class="dia" data-dia="27">27</div>
<div class="dia" data-dia="28">28</div>
<div class="dia" data-dia="29">29</div>
<div class="dia" data-dia="30">30</div>
<div class="dia" data-dia="31">31</div>

    </div>
    <p id="mensagemData"></p>
    
    <button id="confirmar" style="display:none;">
    Confirmar essa data
</button>

</div>

`;

document.getElementById("calendario").style.display = "block";
const dias = document.querySelectorAll(".dia");
const mensagem = document.getElementById("mensagemData");
const confirmar = document.getElementById("confirmar");

dias.forEach((dia)=>{

    dia.addEventListener("click",()=>{

        dias.forEach((d)=>{

            d.style.background = "#edf4fb";
            d.style.color = "#243447";

        });

        dia.style.background = "#6d94bf";
        dia.style.color = "white";
        
        diaEscolhido = Number(dia.dataset.dia);

        mensagem.textContent =
        "Parece um ótimo dia para mim.";

        confirmar.style.display = "inline-block";

    });

});

confirmar.addEventListener("click", () => {

    card.innerHTML = `

        <h1>Perfeito!</h1>

        <p style="margin-top:25px;line-height:1.8;">
            Você com certeza já sabe, mas estou ansioso para te ver novamente.

            <br><br>

            Até lá...!

            <br><br>

            <em>Farei o possível para estar tão bonito quanto você.</em>
        </p>

        <button id="whatsapp">
            Enviar confirmação pelo WhatsApp
        </button>
    
    `;

    document.getElementById("whatsapp").addEventListener("click", () => {

        const textoWhatsapp = `Oi! Escolhi o dia ${diaEscolhido} de agosto de 2026. Nos vemos em breve!`;

window.open(
    `https://wa.me/5582996561047?text=${encodeURIComponent(textoWhatsapp)}`,
    "_blank"
);

});

});

}

botao.addEventListener("click",()=>{

    if(digitando) return;

    if(etapa < mensagens.length - 1){

        etapa++;

        mostrarMensagem();

    }else{

        mostrarCalendario();

    }

});
</script>
</body>

</html>
